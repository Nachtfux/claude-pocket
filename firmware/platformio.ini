[platformio]
default_envs = m5cardputer-adv

[env:m5cardputer-adv]
; arduino-esp32 2.0.x. mbedTLS 2.x can stall on TLS-1.3 post-handshake
; records from Cloudflare-fronted endpoints, so the TTS body is downloaded
; into a LittleFS file via a byte-counted read loop that ignores transient
; `available()==0` rather than treating it as EOF (see docs/SPEC.md §12.1).
; A pioarduino 3.x upgrade was attempted but panics in psramInit on this
; no-PSRAM StampS3A and runs into several other pioarduino quirks.
platform = espressif32@^6.7.0
board = m5stack-stamps3
framework = arduino

monitor_speed = 115200
monitor_filters = esp32_exception_decoder, colorize
upload_speed = 460800

board_build.flash_size = 8MB
board_build.flash_mode = qio
board_build.partitions = default_8MB.csv

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DBOARD_HAS_PSRAM=0
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_ARDUHAL_LOG_COLORS=1
    -DCLAUDE_POCKET_VERSION=\"0.1.0\"
    -std=gnu++17

build_unflags =
    -std=gnu++11

lib_deps =
    m5stack/M5Unified@^0.2.4
    m5stack/M5Cardputer@^1.0.3
    bblanchon/ArduinoJson@^7.2.0
    https://github.com/schreibfaul1/ESP32-audioI2S.git#3.0.7

; --- Burner build ----------------------------------------------------------
; Produces a public binary with NO compile-time API keys. Falls back to
; empty strings everywhere; the user must populate NVS via the Settings
; screen, an SD-card /keys.txt, or the (future) Wi-Fi AP setup flow.
;
; Build:  pio run -e m5cardputer-adv-burner
; Output: .pio/build/m5cardputer-adv-burner/firmware.bin   <-- upload to M5Burner
;
; The BURNER_BUILD macro is consumed by src/keys.cpp; everything else
; inherits unchanged from the m5cardputer-adv env above.
[env:m5cardputer-adv-burner]
extends = env:m5cardputer-adv
build_flags = ${env:m5cardputer-adv.build_flags}
    -DBURNER_BUILD=1
    -DCLAUDE_POCKET_BURNER=1
